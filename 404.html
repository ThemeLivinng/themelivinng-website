<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Page Not Found — Theme Living Interiors</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@300;400&display=swap');
  :root{
    --void:#0a0a0a;--gold:#c9a96e;--champagne:#e8d5b0;--muted:#888;--border:rgba(201,169,110,0.2);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:var(--void);color:var(--champagne);
    font-family:'Montserrat',sans-serif;
    min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:2rem;
  }
  .logo{height:72px;width:auto;margin-bottom:3rem;opacity:0.9;}
  .code{
    font-family:'Cormorant Garamond',serif;font-size:clamp(6rem,15vw,11rem);
    font-weight:300;line-height:1;letter-spacing:-0.02em;
    color:transparent;-webkit-text-stroke:1px rgba(201,169,110,0.3);
    margin-bottom:1.5rem;
  }
  .divider{width:60px;height:1px;background:var(--gold);margin:0 auto 2rem;}
  h1{
    font-family:'Cormorant Garamond',serif;font-size:clamp(1.4rem,4vw,2.2rem);
    font-weight:300;letter-spacing:0.15em;text-transform:uppercase;
    color:var(--champagne);margin-bottom:1rem;
  }
  p{
    font-size:0.82rem;letter-spacing:0.12em;color:var(--muted);
    max-width:380px;line-height:1.9;margin-bottom:3rem;
  }
  a.btn{
    display:inline-block;padding:1rem 2.8rem;
    border:1px solid var(--gold);color:var(--gold);
    font-family:'Montserrat',sans-serif;font-size:0.7rem;
    letter-spacing:0.25em;text-transform:uppercase;text-decoration:none;
    transition:background 0.3s,color 0.3s;
  }
  a.btn:hover{background:var(--gold);color:var(--void);}
  .tagline{
    position:fixed;bottom:2rem;left:0;right:0;text-align:center;
    font-size:0.65rem;letter-spacing:0.2em;color:rgba(136,136,136,0.5);
    text-transform:uppercase;
  }
</style>
</head>
<body>
  <img src="images/GOLDEN HORIZONTAL.png" alt="Theme Living Interiors" class="logo">
  <div class="code">404</div>
  <div class="divider"></div>
  <h1>Page Not Found</h1>
  <p>The space you're looking for seems to have been redesigned. Let us guide you back to something beautiful.</p>
  <a href="index.html" class="btn">Return Home</a>
  <p class="tagline">Where Every Detail Tells a Story</p>
</body>
</html>
